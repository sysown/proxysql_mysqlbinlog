name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  package:
    name: package (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu24
          - centos10
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build ${{ matrix.distro }} package
        run: make ${{ matrix.distro }}

      - name: List built artifacts
        run: ls -l binaries/

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.distro }}
          path: |
            binaries/*.deb
            binaries/*.rpm
          if-no-files-found: error
